<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理容室 統合管理</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
    <!-- PIN画面 -->
    <div id="pin-screen">
        <h1 style="color:white; margin-bottom:20px;">✂ 理容室 統合管理</h1>
        <div class="pin-dots" id="pin-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div id="pin-err" style="color:#ff7675; height:20px; margin:10px 0;"></div>
        <div class="keypad">
            <button onclick="pinKey('1')">1</button><button onclick="pinKey('2')">2</button><button onclick="pinKey('3')">3</button>
            <button onclick="pinKey('4')">4</button><button onclick="pinKey('5')">5</button><button onclick="pinKey('6')">6</button>
            <button onclick="pinKey('7')">7</button><button onclick="pinKey('8')">8</button><button onclick="pinKey('9')">9</button>
            <button style="visibility:hidden"></button><button onclick="pinKey('0')">0</button><button onclick="pinDel()">⌫</button>
        </div>
        <div id="pin-note" style="color:rgba(255,255,255,0.7); font-size:12px; margin-top:20px;"></div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <h1 id="header-title">予約管理</h1>
        </header>

        <main>
            <!-- 予約セクション -->
            <section id="sec-reservation" class="tab-content active">
                <div id="calendar-view"></div>
                <div id="day-view" style="display:none;">
                    <div class="day-header">
                        <button onclick="backToCalendar()">← 戻る</button>
                        <h2 id="selected-date-display"></h2>
                        <div></div>
                    </div>
                    <div class="controls">
                        <button onclick="openReservationModal()" class="btn-primary">新規予約</button>
                        <button onclick="openCustomerModal()" class="btn-secondary">新規顧客</button>
                    </div>
                    <div id="drag-time-indicator" style="display:none;"></div>
                    <div id="reservation-timeline"></div>
                </div>
            </section>

            <!-- 顧客セクション -->
            <section id="sec-customer" class="tab-content">
                <div class="search-bar">
                    <input type="text" id="customer-search" placeholder="名前・電話番号で検索...">
                    <button onclick="openCustomerModal()" class="btn-primary">＋追加</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>名前</th><th>電話番号</th><th>最終来店</th><th>操作</th></tr>
                        </thead>
                        <tbody id="customer-list"></tbody>
                    </table>
                </div>
            </section>

            <!-- 売上セクション -->
            <section id="sec-sales" class="tab-content">
                <div class="sales-tabs">
                    <button class="sub-tab active" onclick="showSubSales('sales-analysis')">分析</button>
                    <button class="sub-tab" onclick="showSubSales('multi-store')">2店舗管理</button>
                    <button class="sub-tab" onclick="showSubSales('sales-input')">売上入力</button>
                </div>

                <div id="sales-analysis" class="sub-sales-content active">
                    <div class="month-selector">
                        <select id="analysis-month" onchange="renderSalesAnalysis()"></select>
                    </div>
                    <div class="metrics-grid" id="sales-metrics"></div>
                    <div class="card">
                        <h3>売上推移</h3>
                        <div class="chart-container"><canvas id="sales-chart"></canvas></div>
                    </div>
                    <div class="card">
                        <h3>客層・メニュー分析</h3>
                        <div class="chart-container"><canvas id="analysis-pie-chart"></canvas></div>
                    </div>
                </div>

                <div id="multi-store" class="sub-sales-content">
                    <div class="store-names">
                        <div class="store-box store-a">
                            <input id="name-a" onchange="saveStoreNames()" placeholder="店舗A">
                        </div>
                        <div class="store-box store-b">
                            <input id="name-b" onchange="saveStoreNames()" placeholder="店舗B">
                        </div>
                    </div>
                    <div class="card">
                        <h3>月別売上比較</h3>
                        <div id="multi-store-table-container"></div>
                    </div>
                </div>

                <div id="sales-input" class="sub-sales-content">
                    <div class="card">
                        <h3>日次売上直接入力</h3>
                        <form id="daily-sales-form">
                            <div class="form-group">
                                <label>日付</label>
                                <input type="date" id="sale-date" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>現金</label>
                                    <input type="number" id="sale-cash" placeholder="0">
                                </div>
                                <div class="form-group">
                                    <label>キャッシュレス</label>
                                    <input type="number" id="sale-credit" placeholder="0">
                                </div>
                            </div>
                            <button type="submit" class="btn-primary">保存</button>
                        </form>
                    </div>
                </div>
            </section>

            <!-- 設定セクション -->
            <section id="sec-settings" class="tab-content">
                <div class="card">
                    <h3>データ管理</h3>
                    <div class="settings-item">
                        <span>自動バックアップ (LocalStorage)</span>
                        <span id="last-backup-time" style="font-size:12px; color:#888;">未実施</span>
                    </div>
                    <button onclick="exportToCSV()" class="btn-secondary">全データエクスポート (iCloud用)</button>
                    <div style="margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <label class="btn-secondary" style="text-align:center; cursor:pointer;">
                            売上分析CSV取込
                            <input type="file" accept=".csv" style="display:none" onchange="importSalesCSV(this)">
                        </label>
                        <label class="btn-secondary" style="text-align:center; cursor:pointer;">
                            2店舗管理CSV取込
                            <input type="file" accept=".csv" style="display:none" onchange="importMultiStoreCSV(this)">
                        </label>
                    </div>
                    <button onclick="changePIN()" class="btn-secondary">PINコード変更</button>
                    <button onclick="clearAllData()" class="btn-danger">全データ削除</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button onclick="switchTab('reservation')" id="nav-reservation" class="active">
                <i>📅</i><span>予約</span>
            </button>
            <button onclick="switchTab('customer')" id="nav-customer">
                <i>👥</i><span>顧客</span>
            </button>
            <button onclick="switchTab('sales')" id="nav-sales">
                <i>💰</i><span>売上</span>
            </button>
            <button onclick="switchTab('settings')" id="nav-settings">
                <i>⚙️</i><span>設定</span>
            </button>
        </nav>
    </div>

    <!-- モーダル類 (予約・顧客・詳細) -->
    <div id="reservation-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('reservation-modal')">&times;</span>
            <h3 id="res-modal-title">予約登録</h3>
            <form id="reservation-form">
                <input type="hidden" id="res-id">
                <div class="form-group">
                    <label>顧客</label>
                    <select id="res-customer-id" required></select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>開始時間</label>
                        <input type="time" id="res-start-time" required>
                    </div>
                    <div class="form-group">
                        <label>料金 (円)</label>
                        <input type="number" id="res-price" placeholder="0">
                    </div>
                </div>
                <div class="menu-selection">
                    <label>メニュー</label>
                    <div class="menu-grid">
                        <label><input type="checkbox" name="menu" data-time="25"> カット</label>
                        <label><input type="checkbox" name="menu" data-time="15"> シェービング</label>
                        <label><input type="checkbox" name="menu" data-time="15"> シャンプー</label>
                        <label><input type="checkbox" name="menu" data-time="60"> カラー</label>
                        <label><input type="checkbox" name="menu" data-time="90"> パーマ</label>
                        <label><input type="checkbox" name="menu" data-time="10"> 耳掃除</label>
                        <label><input type="checkbox" name="menu" data-time="20"> 白髪ぼかし</label>
                        <label><input type="checkbox" name="menu" data-time="25"> 女カット</label>
                        <label><input type="checkbox" name="menu" data-time="30"> 女顔そり</label>
                        <label><input type="checkbox" name="menu" data-time="180"> 縮毛矯正</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>合計時間: <span id="res-total-time">0</span> 分 (+5分休憩)</label>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn-primary">保存</button>
                    <button type="button" id="res-delete-btn" class="btn-danger" style="display:none;" onclick="handleResDelete()">削除</button>
                </div>
            </form>
        </div>
    </div>

    <div id="customer-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('customer-modal')">&times;</span>
            <h3 id="cust-modal-title">顧客登録</h3>
            <form id="customer-form">
                <input type="hidden" id="cust-id">
                <div class="form-group">
                    <label>名前</label>
                    <input type="text" id="cust-name" required>
                </div>
                <div class="form-group">
                    <label>電話番号</label>
                    <input type="tel" id="cust-phone">
                </div>
                <div class="form-group">
                    <label>メモ (改行で箇条書き)</label>
                    <textarea id="cust-note" rows="5"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn-primary">保存</button>
                    <button type="button" id="cust-delete-btn" class="btn-danger" style="display:none;" onclick="handleCustDelete()">削除</button>
                </div>
            </form>
        </div>
    </div>

    <div id="customer-detail-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('customer-detail-modal')">&times;</span>
            <h3 id="detail-name">顧客詳細</h3>
            <div id="detail-info"></div>
            <h4>施術履歴</h4>
            <div id="detail-history"></div>
            <button onclick="editCustomerFromDetail()" class="btn-secondary" style="margin-top:10px;">情報を編集</button>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    <script src="sw.js"></script>
</body>
</html>
