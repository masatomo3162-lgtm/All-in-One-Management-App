<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理容室 経営分析</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
    <!-- PIN画面 -->
    <div id="pin-screen">
        <h1 style="color:white; margin-bottom:20px;">✂ 理容室 経営分析</h1>
        <div class="pin-dots" id="pin-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div id="pin-err" style="color:#ff7675; height:20px; margin:10px 0;"></div>
        <div class="keypad">
            <button onclick="pinKey('1')">1</button><button onclick="pinKey('2')">2</button><button onclick="pinKey('3')">3</button>
            <button onclick="pinKey('4')">4</button><button onclick="pinKey('5')">5</button><button onclick="pinKey('6')">6</button>
            <button onclick="pinKey('7')">7</button><button onclick="pinKey('8')">8</button><button onclick="pinKey('9')">9</button>
            <button style="visibility:hidden"></button><button onclick="pinKey('0')">0</button><button onclick="pinDel()">⌫</button>
        </div>
        <div id="pin-note" style="color:rgba(255,255,255,0.7); font-size:12px; margin-top:20px;"></div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <h1 id="header-title">売上入力</h1>
        </header>

        <main>
            <!-- 入力セクション -->
            <section id="sec-input" class="tab-content active">
                <div class="card">
                    <h3>日次売上入力</h3>
                    <form id="daily-sales-form">
                        <div class="form-group">
                            <label>日付</label>
                            <input type="date" id="sale-date" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>現金 (¥)</label>
                                <input type="number" id="sale-cash" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label>キャッシュレス (¥)</label>
                                <input type="number" id="sale-credit" placeholder="0">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>客数 (名)</label>
                                <input type="number" id="sale-guests" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label>客層メモ</label>
                                <input type="text" id="sale-memo" placeholder="例: 男性3/女性1">
                            </div>
                        </div>
                        <button type="submit" class="btn-primary" style="width:100%">保存</button>
                    </form>
                </div>
                <div class="card">
                    <h3>最近の記帳</h3>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>日付</th><th>売上</th><th>客数</th><th>操作</th></tr></thead>
                            <tbody id="recent-sales-list"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- 分析セクション -->
            <section id="sec-analysis" class="tab-content">
                <div class="month-selector">
                    <select id="analysis-month" onchange="renderAnalysis()"></select>
                </div>
                <div class="metrics-grid" id="sales-metrics"></div>
                <div class="card">
                    <h3>売上推移</h3>
                    <div class="chart-container"><canvas id="sales-chart"></canvas></div>
                </div>
                <div class="card">
                    <h3>曜日別分析</h3>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>曜日</th><th>平均売上</th><th>平均客数</th></tr></thead>
                            <tbody id="weekday-analysis-list"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- 2店舗比較セクション -->
            <section id="sec-multi" class="tab-content">
                <div class="store-names">
                    <div class="store-box store-a">
                        <input id="name-a" onchange="saveStoreNames()" placeholder="店舗A">
                    </div>
                    <div class="store-box store-b">
                        <input id="name-b" onchange="saveStoreNames()" placeholder="店舗B">
                    </div>
                </div>
                <div class="card">
                    <h3>月次売上入力 (他店舗・ログ用)</h3>
                    <form id="monthly-sales-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>年月</label>
                                <input type="month" id="monthly-ym" required>
                            </div>
                            <div class="form-group">
                                <label>店舗名</label>
                                <select id="monthly-store-id">
                                    <option value="a">店舗A</option>
                                    <option value="b">店舗B</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>月間売上 (¥)</label>
                            <input type="number" id="monthly-amount" required>
                        </div>
                        <button type="submit" class="btn-secondary" style="width:100%">ログ保存</button>
                    </form>
                </div>
                <div class="card">
                    <h3>店舗別実績比較</h3>
                    <div class="table-container" id="multi-store-table-container"></div>
                </div>
            </section>

            <!-- 設定セクション -->
            <section id="sec-settings" class="tab-content">
                <div class="card">
                    <h3>データ管理</h3>
                    <div class="settings-item">
                        <span>自動バックアップ (LocalStorage)</span>
                        <span id="last-backup-time" style="font-size:12px; color:#888;">未実施</span>
                    </div>
                    <button onclick="exportToCSV()" class="btn-secondary">全データエクスポート (iCloud用)</button>
                    <div style="margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <label class="btn-secondary" style="text-align:center; cursor:pointer;">
                            売上分析CSV取込
                            <input type="file" accept=".csv" style="display:none" onchange="importSalesCSV(this)">
                        </label>
                        <label class="btn-secondary" style="text-align:center; cursor:pointer;">
                            2店舗管理CSV取込
                            <input type="file" accept=".csv" style="display:none" onchange="importMultiStoreCSV(this)">
                        </label>
                    </div>
                    <button onclick="changePIN()" class="btn-secondary">PINコード変更</button>
                    <button onclick="clearAllData()" class="btn-danger">全データ削除</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button onclick="switchTab('input')" id="nav-input" class="active">
                <i>📝</i><span>入力</span>
            </button>
            <button onclick="switchTab('analysis')" id="nav-analysis">
                <i>📊</i><span>分析</span>
            </button>
            <button onclick="switchTab('multi')" id="nav-multi">
                <i>⚖️</i><span>2店舗</span>
            </button>
            <button onclick="switchTab('settings')" id="nav-settings">
                <i>⚙️</i><span>設定</span>
            </button>
        </nav>
    </div>

    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    <script src="sw.js"></script>
</body>
</html>
